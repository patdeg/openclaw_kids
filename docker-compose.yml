services:
  openclaw-gateway:
    build:
      context: .
      dockerfile: Dockerfile.openclaw
    container_name: openclaw-gateway
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - HOME=/home/openclaw
      - TZ=America/Los_Angeles
      - VAULT_DIR=/home/openclaw/.openclaw/workspace/vault
    volumes:
      # Base .openclaw dir (must be first — sub-mounts overlay on top)
      - ./dotopenclaw:/home/openclaw/.openclaw:rw
      - ./workspace:/home/openclaw/.openclaw/workspace:rw
      - ./vault:/home/openclaw/.openclaw/workspace/vault:rw
      - ./skills:/home/openclaw/.openclaw/workspace/skills:ro
      - ./credentials:/home/openclaw/.openclaw/credentials:rw
      - ./himalaya:/home/openclaw/.config/himalaya:rw
    shm_size: '512mb'
    ports:
      - "127.0.0.1:18789:18789"
      - "127.0.0.1:18800:18800"
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '8'
          pids: 512

  openclaw-web:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: openclaw-web
    restart: unless-stopped
    env_file:
      - alfred-web.env
    environment:
      - TZ=America/Los_Angeles
      - CLAWDBOT_CLI=/usr/local/bin/openclaw-cli
      - VAULT_DIR=/opt/openclaw/vault
      - SKILLS_DIR=/opt/openclaw/skills
      - ALFRED_WEB_PORT=${ALFRED_WEB_PORT:-8085}
    volumes:
      - ./vault:/opt/openclaw/vault:rw
      - ./skills:/opt/openclaw/skills:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /usr/bin/docker:/usr/bin/docker:ro
    ports:
      - "0.0.0.0:${ALFRED_WEB_PORT:-8085}:${ALFRED_WEB_PORT:-8085}"
    depends_on:
      - openclaw-gateway
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '4'
          pids: 128
