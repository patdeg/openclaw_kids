<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ATHENA - Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/style.css">
  <link rel="icon" href="/static/img/avatar.png">
  <link rel="apple-touch-icon" href="/static/img/avatar.png">
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <img src="/static/img/avatar.png" alt="ATHENA" class="login-avatar">
      <h1 class="login-title">ATHENA</h1>
      <p class="login-subtitle">Your AI Assistant</p>
      <a href="/auth/google" class="google-btn">
        <img src="/static/img/google.svg" alt="Google">
        Sign in with Google
      </a>
    </div>
  </div>
</body>
</html>
